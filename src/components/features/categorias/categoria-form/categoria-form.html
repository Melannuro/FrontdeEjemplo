<div class="mb-3">
  <div class="container">
    <div class="card border-succes">
      <div class="card-header text-primary text-center">
        <h2 class="card-title">
          {{ title }}
        </h2>
      </div>

      <div class="card-body text-primary">
        <form>
          <div class="mb-3">
            <label for="nombreCategoria" class="form-label">Nombre Categoria</label>
            <input type="text" id="nombreCategoria" name="nombreCategoria" class="form-control" placeholder="Ingrese el nombre de la categoria" class="form-control" [(ngModel)]="laCategoria().nombreCategoria" required>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
