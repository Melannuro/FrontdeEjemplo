<div class="mb-3">
  <div class="container">
    <div class="card border-success">
      <div class="card-header text-primary text-center">
        <h2 class="card-title">
          {{ id() ? 'Actualizar Mascota' : title }}
        </h2>
      </div>

      <div class="card-body text-primary">
        <form #mascotaForm="ngForm" (ngSubmit)="guardar(mascotaForm)">
          <div class="mb-3">
            <label for="nombreMascota" class="form-label">Nombre Mascota</label>
            <input
              type="text"
              id="nombreMascota"
              name="nombreMascota"
              class="form-control mb-3"
              placeholder="Ingrese el nombre de la mascota"
              [(ngModel)]="laMascota().nombreMascota"
              required
            />

            <label for="especieMascota" class="form-label">Especie</label>
            <input
              type="text"
              id="especieMascota"
              name="especieMascota"
              class="form-control mb-3"
              placeholder="Ingrese la especie (ej. Perro, Gato)"
              [(ngModel)]="laMascota().especieMascota"
              required
            />

            <label for="edadMascota" class="form-label">Edad (Años)</label>
            <input
              type="number"
              id="edadMascota"
              name="edadMascota"
              class="form-control mb-3"
              placeholder="Ingrese la edad de la mascota"
              [(ngModel)]="laMascota().edadMascota"
              required
            />

            <label for="idPropietario" class="form-label">Dueño / Propietario</label>
            <select
              id="idPropietario"
              name="idPropietario"
              class="form-select mb-3"
              [(ngModel)]="laMascota().idPropietario"
              [compareWith]="compararPropietario"
              required
            >
              <option [ngValue]="null" disabled selected>-- Seleccione un propietario --</option>

              @for (lp of listaPropietarios(); track lp.idPropietario) {
                <option [ngValue]="lp">
                  {{ lp.nombrePropietario }}
                </option>
              }
            </select>
          </div>

          <div class="d-flex gap-2 justify-content-end">
            <button type="button" class="btn btn-secondary" (click)="cancelar()">Cancelar</button>
            <button
              type="submit"
              class="btn"
              [ngClass]="id() ? 'btn-warning' : 'btn-primary'"
              [disabled]="mascotaForm.invalid"
            >
              {{ id() ? 'Actualizar' : 'Guardar' }}
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
